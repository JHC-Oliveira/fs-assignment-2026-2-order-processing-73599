services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrongPassword123!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrongPassword123! -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 10

  ordermanagementapi:
    build:
      context: .
      dockerfile: OrderManagementApi/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=OrdersDb;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
      sqlserver:
        condition: service_healthy

  inventoryservice:
    build:
      context: .
      dockerfile: InventoryService/Dockerfile
    environment:
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
    depends_on:
      rabbitmq:
        condition: service_healthy

  paymentservice:
    build:
      context: .
      dockerfile: PaymentService/Dockerfile
    environment:
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
    depends_on:
      rabbitmq:
        condition: service_healthy

  shippingservice:
    build:
      context: .
      dockerfile: ShippingService/Dockerfile
    environment:
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
    depends_on:
      rabbitmq:
        condition: service_healthy

  sportsstore:
    build:
      context: .
      dockerfile: SportsStore/Dockerfile
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      OrderApi__BaseUrl: "http://ordermanagementapi:8080"
      Stripe__PublishableKey: "${STRIPE_PUBLISHABLE_KEY}"
      Stripe__SecretKey: "${STRIPE_SECRET_KEY}"
      ConnectionStrings__SportsStoreConnection: "Server=sqlserver;Database=SportsStore;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;"
      ConnectionStrings__IdentityConnection: "Server=sqlserver;Database=Identity;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_healthy
      ordermanagementapi:
        condition: service_started

  admindashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - ordermanagementapi

volumes:
  sqlserver_data:
